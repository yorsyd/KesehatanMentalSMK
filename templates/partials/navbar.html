<nav style="padding:28px 0 8px;">
  <div class="wrap" style="max-width:1080px;margin:0 auto;padding:0 24px 20px;">
    <div class="brand" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      
      <!-- Brand Logo -->
      <a href="{{ url_for('index') }}" class="brand-mark"
        style="text-decoration:none;display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1.05rem;letter-spacing:0.01em;color:inherit;">
        <span class="dot"
          style="width:9px;height:9px;border-radius:50%;background:#0f8b8d;box-shadow:0 0 0 3px #e2f2f2;"></span>Asesmen&nbsp;Terpadu
      </a>

      <!-- Menu Navigation & User Profile / Logout -->
      <div class="brand-tag mono"
        style="font-size:0.78rem;color:#5b6b7a;letter-spacing:0.06em;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
        
        <a href="{{ url_for('deteksi_emosi') }}"
          style="color:#374151;text-decoration:none;font-weight:300;transition:color 0.15s ease;">Deteksi Emosi</a>
        <a href="{{ url_for('deteksi_fokus') }}"
          style="color:#374151;text-decoration:none;font-weight:300;transition:color 0.15s ease;">Deteksi Fokus</a>
        <a href="{{ url_for('form_uji') }}"
          style="color:#374151;text-decoration:none;font-weight:300;transition:color 0.15s ease;">Form Uji</a>

        <!-- Badge & Logout Siswa -->
        {% if session.get('siswa_id') %}
        <div style="display:flex;align-items:center;gap:10px;margin-left:8px;padding-left:12px;border-left:1px solid #e2e4ea;">
          
          <!-- Student Badge -->
          <div style="display:flex;align-items:center;gap:6px;font-weight:500;color:#374151;">
            <div style="width:24px;height:24px;border-radius:50%;background:#0f8b8d;color:#ffffff;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;">
              {{ (session.get('siswa_nama') or session.get('siswa_nisn') or 'S')[0].upper() }}
            </div>
            <span>{{ session.get('siswa_nama') or session.get('siswa_nisn') or 'Siswa' }}</span>
          </div>

          <!-- Logout Button -->
          <a href="{{ url_for('logout') }}" id="logoutBtn"
            style="display:flex;align-items:center;gap:4px;color:#dc2626;text-decoration:none;font-weight:500;padding:4px 8px;border-radius:6px;background:#fef2f2;transition:background 0.15s ease;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
          </a>

        </div>
        {% endif %}

      </div>

    </div>
  </div>
</nav>
