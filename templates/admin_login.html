<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — Asesmen Kesehatan Mental SMK</title>
  <meta name="description" content="Halaman login untuk admin dan guru. Akses dashboard data asesmen siswa.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --panel: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --ink: #e2e8f0;
      --ink-soft: #94a3b8;
      --amber: #f59e0b;
      --amber-glow: rgba(245,158,11,0.22);
      --amber-soft: rgba(245,158,11,0.10);
      --danger: #f43f5e;
      --success: #10b981;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; opacity: 0.25;
    }
    .blob-1 { width: 500px; height: 500px; background: #f59e0b; top: -150px; right: -100px; }
    .blob-2 { width: 350px; height: 350px; background: #0f8b8d; bottom: -100px; left: -80px; }

    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .card-header {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .lock-icon {
      width: 52px; height: 52px;
      background: var(--amber-soft);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .lock-icon svg { width: 26px; height: 26px; color: var(--amber); }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .subtitle { font-size: 0.85rem; color: var(--ink-soft); }

    /* Flash */
    .flash-area { padding: 16px 32px 0; }
    .flash {
      padding: 11px 14px; border-radius: 10px;
      font-size: 0.85rem; margin-bottom: 8px;
      display: flex; align-items: flex-start; gap: 10px; line-height: 1.4;
    }
    .flash svg { flex-shrink: 0; margin-top: 1px; }
    .flash.danger  { background: rgba(244,63,94,0.12);  border: 1px solid rgba(244,63,94,0.3);  color: #fda4af; }
    .flash.warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
    .flash.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    /* Form */
    .card-body { padding: 24px 32px 32px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: #4b5563; pointer-events: none;
    }
    .input-icon svg { width: 16px; height: 16px; }
    input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #4b5563; }
    input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-glow);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--amber);
      color: #1a1000;
      border: none; border-radius: 10px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: #fbbf24;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--amber-glow);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login svg { width: 16px; height: 16px; }

    .card-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .card-footer a {
      font-size: 0.82rem;
      color: #0f8b8d;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .card-footer a:hover { text-decoration: underline; }
    .card-footer a svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">

    <div class="card-header">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Login Admin</h1>
      <p class="subtitle">Masuk untuk mengakses dashboard data asesmen</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-area">
          {% for category, message in messages %}
            <div class="flash {{ category }}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="card-body">
      <form action="{{ url_for('admin_login') }}" method="POST" id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="username" name="username" placeholder="Username Anda"
                   required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••"
                   required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Masuk ke Dashboard
        </button>
      </form>
    </div>

    <div class="card-footer">
      <a href="{{ url_for('portal') }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Kembali ke halaman utama
      </a>
    </div>

  </div>

  <script>
    // Prevent double-submit
    document.getElementById('loginForm').addEventListener('submit', function() {
      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10" stroke-opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></path></svg> Memverifikasi...';
    });
  </script>
</body>
</html>
